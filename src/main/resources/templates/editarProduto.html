<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Produto</title>
</head>
<body>
    <h1>Editar Empresa</h1>

    <form th:action="@{'/produtoctr/alteraProduto/'+${produtoEditar.id}}"
    th:object="${produtoEditar}" method="post">

        <label for="nome">Nome do Produto:</label>
        <input type="text" id="nome" th:field="*{nome}" required>
        <br><br>

        <label for="valor">Valor:</label>
        <input type="text" id="valor" th:field="*{valor}" required>
        <br><br>

        <label for="categoria">Categoria:</label>
        <input type="text" id="categoria" th:field="*{categoria}" required>
        <br><br>

        <button type="submit">Salvar Alterações</button>
    </form>

    <br>
    <a th:href="@{/produtoctr/listarProduto}">Voltar à Listagem de Produtos</a>
</body>
</html>
